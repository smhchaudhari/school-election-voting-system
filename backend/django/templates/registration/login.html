{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:520px;">
  <div class="card shadow-sm border-0" style="border-radius:20px;">
    <div class="card-body p-4">
      <h1 class="h4 fw-semibold mb-2">Login</h1>
      <p class="text-center mt-3 mb-0">
        New here? <a href="{% url 'signup' %}">Create an account</a>
      </p>

      <p class="text-muted mb-3">Enter your username and password.</p>

      {% if form.errors %}
        <div class="alert alert-danger py-2">Invalid username or password.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          {{ form.username }}
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          {{ form.password }}
        </div>
        <button class="btn btn-success w-100">Login</button>
      </form>
    </div>
  </div>
</div>

<style>
  input { width:100%; padding:.6rem .75rem; border-radius:12px; border:1px solid rgba(16,185,129,.25); }
  input:focus{ outline:none; border-color:rgba(16,185,129,.65); box-shadow:0 0 0 .2rem rgba(16,185,129,.15); }
</style>
{% endblock %}
